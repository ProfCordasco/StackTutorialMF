<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PawPaw</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  </head>
  <body>


    <nav class="navbar navbar-expand-lg" style="background-color: #dcdfe1;" data-bs-theme="light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <i class="fa-duotone fa-solid fa-paw" style="color:#F0867D;"></i>
          PawPaw
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
         
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="fa-regular fa-user"></i> <span id="nome_utente"></span>
              </a>
            </li> 
            <li class="nav-item">
              <button type="button" class="btn btn-dark" onclick="logout()">Log out</button>
            </li>   
          </ul>

        </div>
      </div>
    </nav>

    <div class="container-fluid">
       
      <div class="row">
        <!-- SIDEBAR -->
        <aside class="col-md-3 col-lg-2 sidebar p-3">
          
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link active" href="dashboard.html">
                Dashboard
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="eventi.html">
                Eventi
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="allarmi.html">
                Allarmi
              </a>
            </li>

          </ul>

        </aside>

        <main class="col-md-9 col-lg-10 p-4">
          <div class="mb-4 d-flex justify-content-between align-items-center">
              <div>
                  <h1 class="h3">Modifica cuccia</h1>
                  <p class="text-muted">Aggiorna i dati principali e la posizione della cuccia</p>
              </div>

          </div>

          <div id="messaggio"></div>

          <div class="card card-custom">
            <div class="card-body">
  
              <form id="form-cuccia">
  
                <input type="hidden" id="id">
  
                <div class="mb-3">
                  <label for="nome" class="form-label">Nome cuccia</label>
                  <input type="text" class="form-control" id="nome" required>
                </div>
  
                <div class="mb-3">
                  <label for="zona" class="form-label">Zona</label>
                  <input type="text" class="form-control" id="zona" required>
                </div>
  
                <div class="row">
  
                  <div class="col-md-6 mb-3">
                    <label for="latitudine" class="form-label">Latitudine</label>
                    <input type="number" step="0.0000001" class="form-control" id="latitudine" required>
                  </div>
  
                  <div class="col-md-6 mb-3">
                    <label for="longitudine" class="form-label">Longitudine</label>
                    <input type="number" step="0.0000001" class="form-control" id="longitudine" required>
                  </div>
  
                </div>
  
                <div class="mb-3">
                  <label class="form-label">Seleziona posizione sulla mappa</label>
                  <div id="mappa-selezione"></div>
                  <small class="text-muted">
                    Clicca sulla mappa o trascina il marker per modificare la posizione.
                  </small>
                </div>
  
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">
                    Salva modifiche
                  </button>
  
                  <a href="dashboard.html" class="btn btn-outline-secondary">
                    Annulla
                  </a>
                </div>
  
              </form>
  
            </div>
          </div>

      </main>

      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="js/app.js"></script>
  <script src="js/modifica_cuccia.js"></script>

    
</body>
</html>
